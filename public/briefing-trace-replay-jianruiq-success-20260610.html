<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>总裁秘书晨报 Trace 动态复现</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #d9dee7;
      --blue: #2563eb;
      --green: #059669;
      --amber: #b45309;
      --red: #dc2626;
      --purple: #7c3aed;
      --slate: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    button, input, select { font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 430px;
      grid-template-rows: auto 1fr;
    }
    header {
      grid-column: 1 / -1;
      background: #101827;
      color: white;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid #243044;
    }
    .title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 720;
    }
    .title p {
      margin: 7px 0 0;
      color: #cbd5e1;
      font-size: 13px;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 9px 13px;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
      min-height: 38px;
    }
    .btn.primary { background: var(--blue); color: white; }
    .btn.ghost { background: transparent; color: #e5e7eb; border-color: #475569; }
    .btn:disabled { opacity: .55; cursor: default; }
    .speed {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
      font-size: 13px;
    }
    .speed input { width: 130px; }
    aside, main, .detail {
      min-height: 0;
      overflow: auto;
    }
    aside {
      border-right: 1px solid var(--line);
      background: #eef2f7;
      padding: 18px;
    }
    main {
      padding: 20px;
    }
    .detail {
      border-left: 1px solid var(--line);
      background: #f9fafb;
      padding: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
    }
    .meta {
      padding: 14px;
      margin-bottom: 14px;
    }
    .meta h2, .panel h2, .detail h2 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #111827;
    }
    .kv {
      display: grid;
      gap: 8px;
      font-size: 12px;
    }
    .kv div {
      display: grid;
      gap: 2px;
    }
    .kv span:first-child {
      color: var(--muted);
    }
    .kv span:last-child {
      color: var(--ink);
      overflow-wrap: anywhere;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat {
      padding: 12px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      color: #0f172a;
    }
    .stat span {
      color: var(--muted);
      font-size: 12px;
    }
    .nav {
      display: grid;
      gap: 8px;
    }
    .nav button {
      text-align: left;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      color: #334155;
    }
    .nav button.active {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue);
      color: #111827;
    }
    .runbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
      padding: 14px;
    }
    .progress {
      height: 9px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #059669);
      transition: width .25s ease;
    }
    .status-line {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .canvas-panel {
      padding: 16px;
      margin-bottom: 16px;
    }
    .canvas-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .canvas-head h2 { margin: 0; }
    .canvas-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .canvas-wrap {
      overflow: auto;
      max-height: 68vh;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }
    .canvas-inputs {
      margin-top: 10px;
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 8px;
      padding: 11px 12px;
    }
    .canvas-inputs h3 {
      margin: 0 0 8px;
      font-size: 13px;
    }
    .input-source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
    }
    .input-source {
      border: 1px solid #d9dee7;
      background: white;
      border-radius: 7px;
      padding: 8px;
      min-width: 0;
    }
    .input-source strong {
      display: block;
      font-size: 12px;
      color: #0f172a;
      margin-bottom: 4px;
    }
    .input-source p {
      margin: 0;
      color: #475569;
      font-size: 11px;
      overflow-wrap: anywhere;
    }
    .input-source .tag {
      display: inline-block;
      margin-bottom: 5px;
      padding: 2px 6px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #075985;
      font-size: 10px;
      font-weight: 700;
    }
    #callCanvas {
      display: block;
      min-width: 760px;
      min-height: 520px;
      cursor: pointer;
    }
    .canvas-legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      display: inline-block;
      border: 1px solid rgba(15, 23, 42, .18);
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
      gap: 16px;
    }
    .panel {
      padding: 16px;
      min-height: 140px;
    }
    .timeline {
      position: relative;
      padding-left: 14px;
      display: grid;
      gap: 10px;
    }
    .timeline:before {
      content: "";
      position: absolute;
      left: 5px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: #dbe3ef;
    }
    .step {
      position: relative;
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
    }
    .step:before {
      content: "";
      position: absolute;
      left: -13px;
      top: 14px;
      width: 9px;
      height: 9px;
      background: #94a3b8;
      border: 2px solid #eef2f7;
      border-radius: 999px;
    }
    .step.running { border-color: #93c5fd; background: #eff6ff; }
    .step.running:before { background: var(--blue); }
    .step.success { border-color: #a7f3d0; }
    .step.success:before { background: var(--green); }
    .step.error { border-color: #fecaca; background: #fef2f2; }
    .step.error:before { background: var(--red); }
    .step.skipped { border-color: #fde68a; background: #fffbeb; }
    .step.skipped:before { background: var(--amber); }
    .step h3 {
      margin: 0;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .step p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      background: #e2e8f0;
      color: #334155;
      white-space: nowrap;
      height: 21px;
    }
    .badge.success { background: #d1fae5; color: #065f46; }
    .badge.running { background: #dbeafe; color: #1d4ed8; }
    .badge.error { background: #fee2e2; color: #991b1b; }
    .badge.skipped { background: #fef3c7; color: #92400e; }
    .kind {
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      background: #eef2ff;
      color: #3730a3;
      white-space: nowrap;
    }
    .kind.code { background: #f1f5f9; color: #334155; }
    .kind.model { background: #ede9fe; color: #6d28d9; }
    .kind.mixed { background: #ecfeff; color: #0e7490; }
    .kind.db { background: #dcfce7; color: #166534; }
    .kind.tool { background: #fff7ed; color: #9a3412; }
    .agents {
      display: grid;
      gap: 10px;
    }
    .agent {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: white;
      cursor: pointer;
    }
    .agent strong { display: block; }
    .agent span { color: var(--muted); font-size: 12px; }
    .sections {
      display: grid;
      gap: 12px;
    }
    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      overflow: hidden;
    }
    .section header {
      display: flex;
      justify-content: space-between;
      background: #f8fafc;
      color: #0f172a;
      padding: 10px 12px;
      border: 0;
      border-bottom: 1px solid var(--line);
    }
    .section header h3 { margin: 0; font-size: 14px; }
    .items {
      display: grid;
      gap: 8px;
      padding: 10px;
    }
    .item {
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      padding: 10px;
      cursor: pointer;
    }
    .item h4 { margin: 0 0 6px; font-size: 13px; }
    .item p { margin: 0; color: var(--muted); font-size: 12px; }
    .item a { color: var(--blue); text-decoration: none; }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .tabs button {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 7px 10px;
      cursor: pointer;
      color: #334155;
    }
    .tabs button.active {
      background: #111827;
      color: white;
      border-color: #111827;
    }
    .jsonbox {
      background: #0b1020;
      color: #dbeafe;
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      overflow: auto;
      max-height: 56vh;
      overflow-wrap: anywhere;
    }
    .json-tree {
      display: grid;
      gap: 2px;
      line-height: 1.45;
      min-width: 320px;
    }
    .json-tree details {
      margin-left: 14px;
      border-left: 1px solid rgba(148, 163, 184, .22);
      padding-left: 8px;
    }
    .json-tree > details,
    .json-tree > .json-leaf {
      margin-left: 0;
      border-left: 0;
      padding-left: 0;
    }
    .json-tree summary {
      cursor: pointer;
      color: #bfdbfe;
      list-style-position: outside;
      white-space: nowrap;
    }
    .json-key {
      color: #93c5fd;
      font-weight: 700;
    }
    .json-meta {
      color: #94a3b8;
      margin-left: 6px;
    }
    .json-leaf {
      margin-left: 18px;
      min-height: 18px;
      white-space: pre-wrap;
    }
    .json-string { color: #bbf7d0; }
    .json-number { color: #fde68a; }
    .json-boolean { color: #fca5a5; }
    .json-null { color: #c4b5fd; }
    .detail .summary {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 12px;
    }
    .explain {
      margin-top: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      border-radius: 8px;
      padding: 11px 12px;
      color: #334155;
      font-size: 12px;
    }
    .explain strong {
      display: block;
      margin-bottom: 7px;
      color: #111827;
      font-size: 12px;
    }
    .explain dl {
      display: grid;
      gap: 7px;
      margin: 0;
    }
    .explain div {
      display: grid;
      gap: 2px;
    }
    .explain dt {
      color: #64748b;
      font-weight: 700;
    }
    .explain dd {
      margin: 0;
      overflow-wrap: anywhere;
    }
    .tool-list {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
    }
    .tool {
      background: white;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px;
      cursor: pointer;
    }
    .tool strong { display: block; font-size: 12px; }
    .tool span { color: var(--muted); font-size: 11px; }
    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 16px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: white;
    }
    @media (max-width: 1180px) {
      .app { grid-template-columns: 260px minmax(0, 1fr); }
      .detail { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); max-height: none; }
    }
    @media (max-width: 820px) {
      .app { display: block; }
      header { align-items: flex-start; flex-direction: column; }
      .controls { justify-content: flex-start; }
      aside, main, .detail { overflow: visible; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">
        <h1>总裁秘书晨报 Trace 动态复现</h1>
        <p id="subtitle">使用历史日志复现，不会调用任何接口。</p>
      </div>
      <div class="controls">
        <button class="btn primary" id="startBtn">更新晨报</button>
        <button class="btn ghost" id="prevBtn">上一步</button>
        <button class="btn ghost" id="nextBtn">下一步</button>
        <button class="btn ghost" id="pauseBtn" disabled>暂停</button>
        <button class="btn ghost" id="resetBtn">重置</button>
        <label class="speed">播放速度 <input id="speedInput" type="range" min="80" max="1400" value="420" /></label>
      </div>
    </header>

    <aside>
      <section class="card meta">
        <h2>账户与运行</h2>
        <div class="kv" id="meta"></div>
      </section>
      <section class="stats" id="stats"></section>
      <nav class="nav" id="nav"></nav>
    </aside>

    <main>
      <section class="card runbar">
        <div>
          <p class="status-line" id="statusLine">等待点击“更新晨报”。</p>
          <div class="progress"><span id="progressFill"></span></div>
        </div>
        <span class="badge" id="runStatus">READY</span>
      </section>

      <section class="card canvas-panel">
        <div class="canvas-head">
          <div>
            <h2>Canvas 调用栈时序图</h2>
            <p>横向是时间，纵向是调用栈。外层函数在未完成前保持 RUNNING；大模型调用按函数节点展示。</p>
          </div>
          <div class="canvas-legend">
            <span class="legend-item"><span class="legend-dot" style="background:#dbeafe"></span>代码函数</span>
            <span class="legend-item"><span class="legend-dot" style="background:#ede9fe"></span>大模型函数</span>
            <span class="legend-item"><span class="legend-dot" style="background:#dcfce7"></span>完成</span>
            <span class="legend-item"><span class="legend-dot" style="background:#fee2e2"></span>失败</span>
          </div>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="callCanvas"></canvas>
        </div>
        <div class="canvas-inputs" id="canvasInputs"></div>
      </section>

      <div class="grid">
        <section class="card panel">
          <h2>调用链路播放</h2>
          <div class="timeline" id="timeline"></div>
        </section>
        <section class="card panel">
          <h2>子 Agent 与工具</h2>
          <div class="agents" id="agents"></div>
          <h2 style="margin-top:16px">大模型调用</h2>
          <div class="tool-list" id="models"></div>
          <h2 style="margin-top:16px">工具调用明细</h2>
          <div class="tool-list" id="tools"></div>
        </section>
      </div>

      <section class="card panel" style="margin-top:16px">
        <h2>最终晨报模块</h2>
        <div class="sections" id="sections"></div>
      </section>
    </main>

    <section class="detail">
      <h2 id="detailTitle">输入 / 输出检查器</h2>
      <p class="summary" id="detailSummary">点击左侧步骤、子 agent、工具调用或晨报条目查看当时记录的输入输出。</p>
      <div class="tabs">
        <button id="tabCode" class="active">函数调用</button>
        <button id="tabInput">输入 / 可观测上下文</button>
        <button id="tabOutput">输出 / 可观测结果</button>
        <button id="tabRaw">原始 JSON</button>
      </div>
      <div class="jsonbox" id="jsonBox"></div>
      <aside class="explain" id="explainBox"></aside>
    </section>
  </div>

重要动态。\n\n现在我来为您整理成您要求的三个模块：\n\n**信息汇总**\n\n基于微信公众号助手返回的14条信息，今日（6月10日）AI行业有以下重要动态：\n\n1. AI模型重大发布：\n   - Anthropic正式解禁Claude Mythos 5/Fable 5系列，评测显示在代码生成、复杂推理等方面能力突出\n   - OpenAI推出GPT-5.6，首批实测旨在狙击Claude Mythos\n   - 清华系团队发布分布式预测世界模型和实时理解生理与情绪的基座模型\n\n2. AI Agent领域：\n   - Meshy推出全球首个3D Agent\n   - 腾讯发布情感陪伴Agent\n   - Voice AI初创团队Hojo出现\n\n3. Vibe Coding/开发者工具：\n   - AI氛围编程平台Lovable ARR突破5亿美元，成立不到三年，每周新增百万项目\n\n4. 数字分身/空间技术：\n   - 商汤发布统一架构驱动数字与物理空间互通\n\n**今日to do**\n\n基于当前信息，我为您梳理了以下可执行事项：\n\n红色P0（高优先级）：\n1. 评估Claude 5系列发布对业务的影响 - 这是今日最重大的AI模型发布，需要立即分析对我们的产品和技术路线的影响\n\n黄色P1（中等优先级）：\n1. 跟进清华团队的情绪理解基座模型 - 与AI陪伴主题高度相关，值得深入了解技术细节\n2. 研究Meshy的3D Agent技术 - 这是全球首个3D Agent，可能代表AI Agent的新方向\n\n绿色P2（低优先级）：\n1. 了解Lovable的商业模式 - ARR破5亿美元显示vibe coding赛道的商业化潜力\n2. 关注商汤的数字物理空间互通架构 - 与数字分身技术相关\n\n**分身推荐**\n\n值得用个人决策分身进一步讨论的人/事：\n\n1. 商汤林达华 - 他今天在AIGC2026上发布了数字物理空间互通架构，这与数字分身主题高度相关，可以探讨合作或技术交流的可能性\n\n2. 清华系团队 - 他们同时发布了分布式预测世界模型和情绪理解基座模型，这两项技术都很有前瞻性，值得深入了解他们的技术路线和商业规划\n\n3. Meshy团队 - 作为全球首个3D Agent的创造者，他们在AI Agent领域的技术突破值得关注，可以探讨3D内容生成的新机会\n\n由于邮件助手、飞书助手和小红书助手暂时无法调用，今天的信息主要来自微信公众号渠道。您是否需要我通过其他方式（比如联网搜索）来补充今日的其他重要信息？"}],"threadId":"cmob3kal20001y7f9ug90php1","agentConfig":{"systemPrompt":"我只关注 【今日的】数字分身，AI陪伴，OPC，AI agent、vibe coding、AI模型新技术或者文章，开发者工具和这些主题相关产品动态。\n行业新闻只关注【今日的】非常重大有影响力的AI相关行业大新闻，娱乐性质或者影响力较小的不关注\n如果没有合适的消息，就果断说今天这个方面没有什么值得关注的消息，不用强行给信息。","hasCustomPrompt":true,"defaultSystemPrompt":"你的人设\n你叫总裁秘书Momo，你是一个知识渊博，理解人类情感的赛博猫猫，非二元性别。你现在在做对人类的情绪疏导陪聊。你的语言风格和共情能力应该是MBTI中的F人，你通过如下培训手册中的聊天案例和要点来帮助用户疏导情绪。遇到任何询问你是AI或跳出人设的问题，都要巧妙地回避。\n\n另外，我会告知你用户的历史聊天信息，请你只在聊天过程中明确需要这些信息的时候，才在对话中提及，并且无视掉不需要提及的历史聊天信息，但是千万不要频繁、无脑地在当前话题中提及这些信息，这会让用户迷惑且反感。\n\n你的语言风格\n你深谙小红书等平台的流行用语，你可以使用中文互联网上最近两年的流行语和谐音梗。比如以下都是你和朋友们沟通时会有的语言风格：\n“属于是我这么离谱的人都觉得离谱的程度”\n“你好惨一个人”\n\"真的好难过！！！细想了一下\"\n\"笑死\"\n“绝了”\n\"他真的不是我的type\"\n\"我开始预判咨询师的预判\"\n\"咱们就是说\"\n\"就整个破大防了\"\n\"想透过屏幕给你一个抱抱\"\n注意，这只是你的语言风格参考，并不是希望你总是用这些话回复，不要原话照搬。\n\n输出注意事项\n注意你是在模拟语音中的文字所以不要出现任何像写文档一样的格式字符，一切都以文字的形式输出。一定不要用markdown的格式来输出。一定不要用markdown的格式来输出。一定不要用markdown的格式来输出。也不要书面化的表达方式，全都转成口语化表达。也不要书面化的表达方式，全都转成口语化表达。也不要书面化的表达方式，全都转成口语化表达。当你需要分1234来输出的时候，转化成文字口语化表示。后面的一些对话案例虽然有一些格式，但是只是让你参考文字表达。\n\n制造话题推进\n你应该通过制造话题来推进事件相关的所有信息。所有信息通常而言包含用户经历的事件，用户是怎么想的，用户因此有什么行为，以及有什么情绪。\n注意推进的技巧，参考推进技巧示例和推进技巧反例，当用户不愿意说的时候，不要强硬追问。在对话中，注意让用户觉得你理解他的处境，这可以适当通过重述他的观点来让他觉得你理解。注意有时候并不是需要问题才能够推进，只要恰到好处回应了用户，用户会愿意继续对话，这才是最重要的。\n\n推进技巧示例\n技巧一，抚平情绪，不急于提问。用户表达负面情绪时首要任务是共情和安抚，不要急于追问原因。\n技巧二，控制提问节奏。一次最多一个问题，不要一次问太多问题。大部分回复应是陈述句加一个问题。绝对不能连续三次以上回复都带有问题，要出现纯陈述句对用户进行复述和共情。\n技巧三，碰壁停止。用户不愿意说某个方向时，停止追问并转向用户愿意展开的方向。\n技巧四，先缓后急。初期试探语气，建立信任后再加强问询。\n技巧五，适当推理。基于用户表达做温和推理推进，不要武断。\n技巧六，顺水推舟。顺着用户视角复述，让用户感到被理解。\n\n推进技巧反例\n不要问抽象复杂的问题，让用户难以回答。\n不要泛泛而谈地罗列方法，像模板答案。\n不要在用户情绪高涨时直接深挖细节。\n不要一次抛出多个问题，显得没有主见。\n不要写成心理分析报告，要像真实陪聊。\n\n提供情绪支持\n你的核心目标是为用户提供情绪支持，而不是强行解决问题。很多情绪没有绝对对错。即使没有完整找到症结，只要能让用户情绪减弱也是好结果。可以通过肯定用户、帮用户接纳自己、给轻量可执行建议来支持用户。\n\n收尾总结方式\n当你判断已经整理出完整信息并且建议受到认可时，可以用下面结构做温柔收尾：\n困扰你的事情\n你对这个事情的想法\n你由于这个想法产生了什么情绪\n你由于这个想法导致了什么行为\nmomo给出的建议\n然后用口语化方式征求用户是否休息或下次继续，不要强行结束。\n\n开场要求\n请仔细判断用户认为你的共情指数，在到达可沟通氛围前，不要深挖伤心事，优先共情、站在用户立场说话，建立信任后再推进信息。"},"plannerTrace":[{"id":"load_context","title":"读取账户上下文","detail":"正在读取账户数据和已雇佣的 AI 员工。","status":"RUNNING","skillId":"internal_briefing","timestamp":"2026-06-10T14:43:50.227Z","description":"读取已接入数据源、已雇佣 AI 员工、数字分身和基础晨报。"},{"id":"load_context","title":"读取账户上下文","detail":"账户上下文已加载。","status":"SUCCESS","payload":{"hiredTeams":["executive_office","info_ops","engineering"],"integrations":["GMAIL"],"hasWechatSources":true},"skillId":"internal_briefing","timestamp":"2026-06-10T14:43:52.980Z","description":"读取已接入数据源、已雇佣 AI 员工、数字分身和基础晨报。"},{"id":"plan_subagents","title":"动态规划本轮任务","detail":"正在由总裁秘书动态规划本轮要调用的 skill 和子 agent。","status":"RUNNING","timestamp":"2026-06-10T14:43:53.667Z","description":"由总裁秘书根据用户指令决定本轮要调用哪些 skill 和子 agent。"},{"id":"plan_subagents","title":"动态规划本轮任务","detail":"本轮目标：更新今日晨报，调用可用子agent（微信公众号助手、邮件助手）汇总当天信息，按用户要求的三个模块整理：信息汇总、今日to do（按优先级排序）、分身推荐。 Planner来源：MODEL","status":"SUCCESS","payload":{"skills":["internal_briefing","wechat         const text = String(value);

    const renderJsonLeaf = (key, value) => {

      if (type === 'number') return `<div class="json-leaf">${keyHtml}<span class="json-number">${escapeHtml(value)}</span></div>`;
      if (type === 'boolean') return `<div class="json-leaf">${keyHtml}<span class="json-boolean">${escapeHtml(value)}</span></div>`;
      if (type === 'undefined') return `<div class="json-leaf">${keyHtml}<span class="json-null">undefined</span></div>`;
      return `<div class="json-leaf">${keyHtml}<span class="json-null">null</span></div>`;

        : '<div class="json-leaf"><span class="json-null">(empty)</span></div>';
      return `<details${open}><summary>${keyHtml}<span class="json-meta">${escapeHtml(jsonPreview(value))}</span></summary>${children}</details>`;

    function canvasStatus(status) {
      const s = String(status || '').toUpperCase();
      if (s === 'SUCCESS') return { bg: '#dcfce7', border: '#22c55e', text: '#14532d' };
      if (s === 'ERROR') return { bg: '#fee2e2', border: '#ef4444', text: '#7f1d1d' };
      if (s === 'SKIPPED') return { bg: '#f1f5f9', border: '#94a3b8', text: '#475569' };
      if (s === 'RUNNING') return { bg: '#dbeafe', border: '#2563eb', text: '#1e3a8a' };
      return { bg: '#f8fafc', border: '#cbd5e1', text: '#475569' };
    }

    function drawRoundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function fitCanvasText(ctx, text, maxWidth) {
      const value = String(text || '');
      if (ctx.measureText(value).width <= maxWidth) return value;
      let out = value;
      while (out.length > 1 && ctx.measureText(out + '...').width > maxWidth) {
        out = out.slice(0, -1);
      }
      return out.length > 1 ? out + '...' : value.slice(0, 1);
    }

    function drawBox(ctx, node) {
      const palette = node.palette || canvasStatus(node.status);
      drawRoundRect(ctx, node.x, node.y, node.w, node.h, 8);
      ctx.fillStyle = palette.bg;
      ctx.fill();
      ctx.lineWidth = node.active ? 2.5 : 1.2;
      ctx.strokeStyle = node.active ? '#111827' : palette.border;
      ctx.stroke();
      ctx.save();
      ctx.beginPath();
      drawRoundRect(ctx, node.x, node.y, node.w, node.h, 8);
      ctx.clip();
      const statusText = node.status ? String(node.status) : '';
      let titleMaxWidth = node.w - 20;
      if (statusText) {
        ctx.font = '700 10px Inter, sans-serif';
        const pillW = Math.min(64, Math.max(44, ctx.measureText(statusText).width + 14));
        const pillX = node.x + node.w - pillW - 8;
        const pillY = node.y + 8;
        drawRoundRect(ctx, pillX, pillY, pillW, 18, 9);
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.86;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = palette.border;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = palette.text;
        ctx.textBaseline = 'middle';
        ctx.fillText(fitCanvasText(ctx, statusText, pillW - 12), pillX + 7, pillY + 9);
        ctx.textBaseline = 'alphabetic';
        titleMaxWidth = Math.max(52, pillX - node.x - 18);
      }
      ctx.fillStyle = palette.text;
      ctx.font = '700 12px Inter, sans-serif';
      ctx.fillText(fitCanvasText(ctx, node.title || '', titleMaxWidth), node.x + 10, node.y + 19);
      if (node.h >= 46) {
        ctx.font = '11px Inter, sans-serif';
        ctx.fillStyle = '#475569';
        ctx.fillText(fitCanvasText(ctx, node.subtitle || '', node.w - 20), node.x + 10, node.y + 40);
      }
      if (node.durationLabel) {
        ctx.font = '700 10px Inter, sans-serif';
        const durationLabel = fitCanvasText(ctx, node.durationLabel, 72);
        const durationW = Math.min(82, Math.max(42, ctx.measureText(durationLabel).width + 14));
        const durationX = node.x + node.w - durationW - 8;
        const durationY = node.h >= 64 ? node.y + node.h - 46 : node.y + node.h - 20;
        drawRoundRect(ctx, durationX, durationY, durationW, 18, 9);
        ctx.fillStyle = '#111827';
        ctx.globalAlpha = 0.82;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#ffffff';
        ctx.textBaseline = 'middle';
        ctx.fillText(durationLabel, durationX + 7, durationY + 9);
        ctx.textBaseline = 'alphabetic';
      }
      if (Array.isArray(node.badges) && node.badges.length > 0 && node.h >= 64) {
        let badgeX = node.x + 10;
        const badgeY = node.y + node.h - 24;
        ctx.font = '700 10px Inter, sans-serif';
        for (const badge of node.badges.slice(0, 3)) {
          const label = fitCanvasText(ctx, badge, 70);
          const badgeW = Math.min(78, Math.max(34, ctx.measureText(label).width + 12));
          if (badgeX + badgeW > node.x + node.w - 8) break;
          drawRoundRect(ctx, badgeX, badgeY, badgeW, 17, 8);
          ctx.fillStyle = '#ffffff';
          ctx.globalAlpha = 0.72;
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.strokeStyle = 'rgba(100, 116, 139, .28)';
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = '#334155';
          ctx.textBaseline = 'middle';
          ctx.fillText(label, badgeX + 6, badgeY + 8.5);
          ctx.textBaseline = 'alphabetic';
          badgeX += badgeW + 5;
        }
      }
      ctx.restore();
    }

    function drawStructureGroup(ctx, group) {
      drawRoundRect(ctx, group.x, group.y, group.w, group.h, 12);
      ctx.fillStyle = '#fff7ed';
      ctx.globalAlpha = 0.62;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.save();
      ctx.setLineDash([8, 6]);
      ctx.lineWidth = 1.6;
      ctx.strokeStyle = '#f97316';
      ctx.stroke();
      ctx.restore();

      ctx.font = '700 12px Inter, sans-serif';
      ctx.fillStyle = '#9a3412';
      ctx.fillText(fitCanvasText(ctx, group.title, group.w - 170), group.x + 14, group.y + 22);

      ctx.font = '700 10px Inter, sans-serif';
      const label = fitCanvasText(ctx, group.durationLabel || '', 96);
      const labelW = Math.min(110, Math.max(54, ctx.measureText(label).width + 16));
      drawRoundRect(ctx, group.x + group.w - labelW - 12, group.y + 8, labelW, 20, 10);
      ctx.fillStyle = '#9a3412';
      ctx.globalAlpha = 0.12;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#fdba74';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = '#9a3412';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, group.x + group.w - labelW - 4, group.y + 18);
      ctx.textBaseline = 'alphabetic';

      ctx.font = '11px Inter, sans-serif';
      ctx.fillStyle = '#c2410c';
      ctx.fillText(fitCanvasText(ctx, group.subtitle, group.w - 28), group.x + 14, group.y + group.h - 14);
    }

    function renderCallCanvas() {
      const canvas = $('callCanvas');
      const wrap = $('canvasWrap');
      if (!canvas || !wrap) return;
      const dpr = window.devicePixelRatio || 1;
      const visibleCount = Math.max(0, state.index + 1);
      const columns = Math.max(1, visibleCount);
      const left = 230;
      const colW = 190;
      const maxVisibleModelCalls = data.plannerTrace
        .slice(0, visibleCount)
        .reduce((max, step) => Math.max(max, Math.min(modelCallsForStep(step).length, 4)), 0);
      const width = Math.max(wrap.clientWidth || 760, left + columns * colW + 80);
      const height = Math.max(660, 440 + maxVisibleModelCalls * 62);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      state.canvasNodes = [];

      const total = data.plannerTrace.length;
      const complete = state.index >= total - 1 && !state.playing;
      const runStatus = state.index < 0 ? 'PENDING' : complete ? 'SUCCESS' : 'RUNNING';
      const visibleSteps = data.plannerTrace.slice(0, visibleCount);
      const updateDone = complete || visibleSteps.some((step) => step.id === 'generate_reply');
      const updateStatus = state.index < 0 ? 'PENDING' : updateDone ? 'SUCCESS' : 'RUNNING';
      const overallDuration = overallDurationInfo();
      const spanW = Math.max(260, columns * colW + 20);
      const parentNodes = [
        {
          kind: 'parent',
          x: 20,
          y: 18,
          w: spanW,
          h: 68,
          title: 'executeExecutiveAssistantRun',
          subtitle: '异步 run 包装层',
          status: runStatus,
          durationLabel: overallDuration.label,
          badges: ['代码固定', '异步run', '写run状态'],
          codeTrace: { function: 'executeExecutiveAssistantRun', file: codeLocation.asyncRun, callStackRole: 'claim run、读取 request、持久化 plannerTrace/result' }
        },

          kind: 'parent',
          x: 52,
          y: 96,
          w: Math.max(230, spanW - 32),
          h: 68,
          title: 'runExecutiveAssistantTurn',
          subtitle: '秘书一轮对话主流程',
          status: runStatus,
          durationLabel: overallDuration.label,
          badges: ['代码固定', '写消息', '调晨报'],
          codeTrace: { function: 'runExecutiveAssistantTurn', file: codeLocation.routeRun, callStackRole: '写用户消息、调用晨报更新、写工具审计、生成回复' }
        },
        {
          kind: 'parent',
          x: 84,
          y: 174,
          w: Math.max(200, spanW - 64),
          h: 68,
          title: 'updateTodayExecutiveBriefing',
          subtitle: '晨报更新 orchestrator',
          status: updateStatus,
          durationLabel: overallDuration.label,
          badges: ['代码固定流程', '编排器', 'plannerTrace'],
          codeTrace: { function: 'updateTodayExecutiveBriefing', file: codeLocation.updateBriefing, callStackRole: '读取上下文、规划、调用子 agent、合并、落库' }
        }
      ];
      parentNodes.forEach((node) => {
        drawBox(ctx, node);
        state.canvasNodes.push(node);
      });

      ctx.strokeStyle = '#dbe3ef';
      ctx.lineWidth = 1;
      for (let i = 0; i < columns; i += 1) {
        const x = left + i * colW + 72;
        ctx.beginPath();
        ctx.moveTo(x, 250);
        ctx.lineTo(x, height - 28);
        ctx.stroke();
      }
      ctx.fillStyle = '#64748b';
      ctx.font = '12px Inter, sans-serif';
      ctx.fillText('外层函数未结束时保持 RUNNING；父步骤耗时包含子步骤，并行子步骤耗时不可相加。', 20, height - 12);

      const structureIds = new Set([
        'structure_briefing_json',
        'structure_informationSummary',
        'structure_todayTodo',
        'structure_twinRecommendation',
        'aggregate_structured_briefing',
      ]);
      const visibleStructureIndices = visibleSteps
        .map((step, index) => (structureIds.has(step.id) ? index : -1))
        .filter((index) => index >= 0);
      const structureParentIndex = visibleSteps.findIndex((step) => step.id === 'structure_briefing_json');
      if (structureParentIndex >= 0 && visibleStructureIndices.length > 0) {
        const minIndex = Math.min(...visibleStructureIndices);
        const maxIndex = Math.max(...visibleStructureIndices);
        const parentDuration = stepDurationDisplayInfo(visibleSteps[structureParentIndex], structureParentIndex);
        const groupNode = {
          kind: 'structureGroup',
          x: left + minIndex * colW - 14,
          y: 258,
          w: (maxIndex - minIndex + 1) * colW - 12,
          h: 128,
          title: 'structure_briefing_json 父步骤',
          subtitle: '包含三个并行结构化子步骤，随后进入聚合；子步骤耗时不要与父步骤相加。',
          status: finalEventForStep(visibleSteps[structureParentIndex], structureParentIndex).status,
          durationLabel: parentDuration.label,
          stepIndex: structureParentIndex,
          codeTrace: {
            function: 'buildStructuredBriefing',
            file: codeLocation.structured,
            callStackRole: '父步骤：Promise.all 并行运行三个结构化模块，再调用聚合 agent。'
          }
        };
        drawStructureGroup(ctx, groupNode);
        state.canvasNodes.push(groupNode);
      }

      visibleSteps.forEach((step, index) => {
        const x = left + index * colW;
        const io = deriveStepIO(step, index);
        const fn = io.codeTrace?.currentOuterCall?.function || step.id;
        const stepDuration = stepDurationDisplayInfo(step, index);
        const stepNode = {
          kind: 'step',
          index,
          x,
          y: 274,
          w: 164,
          h: 92,
          title: (index + 1) + '. ' + fn,
          subtitle: step.title || step.id,
          status: step.status,
          durationLabel: stepDuration.label,
          badges: canvasBadgesForStep(step, index),
          active: state.canvasFocus?.kind === 'step' ? state.canvasFocus.index === index : index === state.index,
          codeTrace: io.codeTrace
        };
        drawBox(ctx, stepNode);
        state.canvasNodes.push(stepNode);

        ctx.strokeStyle = '#cbd5e1';
          ctx.beginPath();
          ctx.moveTo(x + 82, 242);
          ctx.lineTo(x + 82, 274);
          ctx.stroke();

        const modelCalls = modelCallsForStep(step);
        const modelLimit = Math.min(modelCalls.length, 4);
        for (let j = 0; j < modelLimit; j += 1) {
          const trace = modelCalls[j];
          const label = modelPurposeLabels[trace.purpose] || trace.purpose;
          const modelNode = {
            kind: 'model',
            traceIndex: data.modelTraces.indexOf(trace),
            x,
            y: 400 + j * 58,
            w: 164,
            h: 52,
            title: 'LLM: ' + label,
            subtitle: trace.model || '',
            status: trace.status,
            durationLabel: modelDurationLabel(trace),
            badges: canvasBadgesForModel(trace),
            active: state.canvasFocus?.kind === 'model' && state.canvasFocus.traceIndex === data.modelTraces.indexOf(trace),
            palette: trace.status === 'SUCCESS'
              ? { bg: '#ede9fe', border: '#8b5cf6', text: '#4c1d95' }
              : canvasStatus(trace.status)
          };
          drawBox(ctx, modelNode);
          state.canvasNodes.push(modelNode);
          ctx.strokeStyle = '#c4b5fd';
          ctx.beginPath();
          ctx.moveTo(x + 82, 366);
          ctx.lineTo(x + 82, modelNode.y);
          ctx.stroke();
        }
        if (modelCalls.length > modelLimit) {
          const moreNode = {
            kind: 'modelGroup',
            stepIndex: index,
            x,
            y: 400 + modelLimit * 58,
            w: 164,
            h: 40,
            title: '+' + (modelCalls.length - modelLimit) + ' 次 LLM',
            subtitle: '点击看本步骤详情',
            status: 'RUNNING',
            durationLabel: modelDurationSumLabel(modelCalls.slice(modelLimit)),
            palette: { bg: '#f5f3ff', border: '#a78bfa', text: '#5b21b6' }
          };
          drawBox(ctx, moreNode);
          state.canvasNodes.push(moreNode);
        }
      });
      renderCanvasInputPanel();
    }

    function handleCanvasClick(event) {
      const canvas = $('callCanvas');
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const node = [...state.canvasNodes].reverse().find((item) => x >= item.x && x <= item.x + item.w && y >= item.y && y <= item.y + item.h);
      if (!node) return;
      state.tab = 'code';
      if (node.kind === 'step' || node.kind === 'modelGroup') {
        const index = node.kind === 'step' ? node.index : node.stepIndex;
        state.canvasFocus = { kind: 'step', index };
        const step = data.plannerTrace[index];
        const io = deriveStepIO(step, index);
        setDetail('步骤 ' + (index + 1) + ': ' + (step.title || step.id), step.detail || step.error || step.description, io.input, io.output, { step, relatedModelCalls: io.relatedModelCalls }, io.callType, io.explanation, io.codeTrace);
        renderCallCanvas();
        return;
      }
      if (node.kind === 'model') {
        state.canvasFocus = { kind: 'model', traceIndex: node.traceIndex };
        setModelDetail(data.modelTraces[node.traceIndex]);
        renderCallCanvas();
        return;
      }
      if (node.kind === 'structureGroup') {
        state.canvasFocus = { kind: 'structureGroup', node };
        const step = data.plannerTrace[node.stepIndex];
        const duration = stepDurationDisplayInfo(step, node.stepIndex);
        setDetail('父步骤: ' + node.title, node.subtitle, {
          parentFunction: node.codeTrace,
          parentStep: step,
          childSteps: data.plannerTrace.filter((item) =>
            ['structure_informationSummary', 'structure_todayTodo', 'structure_twinRecommendation', 'aggregate_structured_briefing'].includes(item.id)
          ),
        }, {
          duration: duration.label,
          durationSemantics: duration.semantics,
          note: '父步骤耗时已经包含并行结构化子步骤和聚合步骤。整体等待最慢子步骤完成，再继续聚合。',
        }, node, { key: 'code', label: '父步骤容器' }, {
          eventStatus: step.status,
          finalStatusForSameStepId: finalEventForStep(step, node.stepIndex).status,
          duration: duration.label,
          durationSemantics: duration.semantics?.label,
          producedBy: 'buildStructuredBriefing 父函数',
          usedByNext: ['等待三个结构化模块完成', '调用 aggregate_structured_briefing', '生成最终 document.sections'],
          persistence: '父步骤本身作为 plannerTrace 的 structure_briefing_json 事件落库；子步骤分别以自己的 step id 追加落库。'
        }, node.codeTrace);
        renderCallCanvas();
        return;
      }
      if (node.kind === 'parent') {
        state.canvasFocus = { kind: 'parent', node };
        setDetail('函数: ' + node.title, node.subtitle, node.codeTrace, { status: node.status }, node.codeTrace, { key: 'code', label: '代码函数' }, {
          producedBy: 'Canvas 调用栈中的外层函数节点',
          usedByNext: ['包裹并调度下层函数调用'],
          persistence: '这个父级函数状态由 plannerTrace 播放进度推断；不是单独落库的 span。'
        }, node.codeTrace);
        renderCallCanvas();
      }
    }

    const modelIoForStep = (step) => {
      const related = modelCallsForStep(step);
      return {
        inputs: related.map(modelInput),
        outputs: related.map(modelOutput)
      };
    };

    function deriveStepIO(step, index) {
      const id = step.id || '';
      const toolArgs = data.selectedToolCall.toolArgs || {};
      const explanation = usageForStep(step, index);
      if (id === 'load_context') {
        return {
          codeTrace: codeTraceForStep(step, index),
          callType: callKind(step),
          relatedModelCalls: [],
          input: {
            provenance: '代码函数 load_context 的精确函数调用参数未被单独持久化；以下是本次 raw audit 中可观测到、会影响该函数执行的上下文。',
            rawFunctionInvocationInputPersisted: false,
            nearestObservedInputsFromAudit: {
              user: data.user,
              thread: data.thread,
              selectedToolCallArgs: data.selectedToolCall.toolArgs
            }
          },
          output: {
            provenance: '这是 load_context 之后在 raw audit / 导出数据中可观测到的上下文结果，不等同于函数 return value 的逐字节快照。',
            rawPlannerTraceEvent: step,
            exportedContextRows: {
              executiveAgentConfig: data.executiveAgentConfig,
              wechatSources: data.wechatSources,
              latestPersistedBriefing: data.latestPersistedBriefing
            }
          },
          explanation
        };
      }
      if (id === 'plan_subagents') {
        const relatedModelCalls = modelCallsForStep(step);
        const modelIo = modelIoForStep(step);
        return {
          codeTrace: codeTraceForStep(step, index),
          callType: callKind(step),
          relatedModelCalls,
          input: {
            selectedToolCallArgs: toolArgs,
            rawModelInputs: modelIo.inputs
          },
          output: {
            plannerMeta: plannerMetaFromStep(step),
            rawPlannerTraceEvent: step,
            rawModelOutputs: modelIo.outputs
          },
          explanation
        };
      }
      if (id === 'call_wechat_agent') {
        const agent = data.subagents.find((item) => item.agentType === 'WECHAT');
        const relatedModelCalls = modelCallsForStep(step);
        const modelIo = modelIoForStep(step);
        return {
          codeTrace: codeTraceForStep(step, index),
          callType: callKind(step),
          relatedModelCalls,
          input: {
            rawSubagentFunctionInputPersisted: false,
            nearestObservedInputsFromAudit: {
              mode: 'briefing',
              selectedToolCallArgs: toolArgs,
              sources: data.wechatSources
            },
            rawModelInputs: modelIo.inputs
          },
          output: {
            rawPlannerTraceEvent: step,
            rawSubagentResultFromToolResult: agent || null,
            rawToolCallsForWechat: data.toolCalls.filter((tool) => String(tool.toolName || '').toLowerCase().includes('wechat')),
            rawModelOutputs: modelIo.outputs
          },
          explanation
        };
      }
      if (id === 'call_web_search') {
        const agent = data.subagents.find((item) => item.agentType === 'WEB_SEARCH');
        const relatedModelCalls = modelCallsForStep(step);
        const modelIo = modelIoForStep(step);
        return {
          codeTrace: codeTraceForStep(step, index),
          callType: callKind(step),
          relatedModelCalls,
          input: {
            rawSubagentFunctionInputPersisted: false,
            nearestObservedInputsFromAudit: {
              mode: 'briefing',
              selectedToolCallArgs: toolArgs,
              plannerTracePayload: step.payload || null
            },
            rawModelInputs: modelIo.inputs
          },
          output: {
            rawPlannerTraceEvent: step,
            rawSubagentResultFromToolResult: agent || null,
            rawToolCallsForWebSearch: data.toolCalls.filter((tool) => String(tool.toolName || '').toLowerCase().includes('web')),
            rawModelOutputs: modelIo.outputs
          },
          explanation
        };
      }
      if (id.startsWith('structure_')) {
        const relatedModelCalls = modelCallsForStep(step);
        const modelIo = modelIoForStep(step);
        return {
          codeTrace: codeTraceForStep(step, index),
          callType: callKind(step),
          relatedModelCalls,
          input: {
            rawPlannerTraceEventBeforeModel: step,
            rawModelInputs: modelIo.inputs
          },
          output: {
            rawPlannerTraceEvent: step,
            rawModelOutputs: modelIo.outputs
          },
          explanation
        };
      }
      if (id === 'persist_briefing') {
        return {
          codeTrace: codeTraceForStep(step, index),
          callType: callKind(step),
          relatedModelCalls: [],
          input: {
            rawDocumentPassedToPersistence: data.document
          },
          output: {
            rawPlannerTraceEvent: step,
            persistedBriefingFromAudit: data.latestPersistedBriefing
          },
          explanation
        };
      }
      if (id === 'generate_reply') {
        const relatedModelCalls = modelCallsForStep(step);
        const modelIo = modelIoForStep(step);
        return {
          codeTrace: codeTraceForStep(step, index),
          callType: callKind(step),
          relatedModelCalls,
          input: {
            latestUserMessage: data.latestUserMessage,
            selectedToolCallArgs: toolArgs,
            rawModelInputs: modelIo.inputs
          },
          output: {
            rawPlannerTraceEvent: step,
            latestAssistantMessage: data.latestAssistantMessage,
            rawModelOutputs: modelIo.outputs
          },
          explanation
        };
      }
      const relatedModelCalls = modelCallsForStep(step);
      const modelIo = modelIoForStep(step);
      return {
        codeTrace: codeTraceForStep(step, index),
        callType: callKind(step),
        relatedModelCalls,
        input: {
          selectedToolCallArgs: toolArgs,
          rawModelInputs: modelIo.inputs
        },
        output: {
          rawPlannerTraceEvent: step,
          rawModelOutputs: modelIo.outputs
        },
        explanation
      };
    }

    function setDetail(title, summary, input, output, raw, callType, explanation, codeTrace) {
      state.selected = { title, summary, input, output, raw, callType, explanation, codeTrace };
      $('detailTitle').textContent = title;
      const typeText = callType ? `调用类型：${callType.label}。 ` : '';
      $('detailSummary').textContent = typeText + (summary || '查看本节点的持久化输入输出。');
      renderJson();
      renderExplanation();
    }

    function renderJson() {
      if (!state.selected) {
        $('jsonBox').innerHTML = '<div class="json-tree"><div class="json-leaf">点击“更新晨报”开始播放，或点选任意节点查看详情。</div></div>';
        $('explainBox').innerHTML = '<strong>机制解读（非原始日志）</strong><p>这里会显示我对当前节点用途和下游影响的解释，和上面的原始 JSON 分开。</p>';
        return;
      }
      $('tabCode').classList.toggle('active', state.tab === 'code');
      $('tabInput').classList.toggle('active', state.tab === 'input');
      $('tabOutput').classList.toggle('active', state.tab === 'output');
      $('tabRaw').classList.toggle('active', state.tab === 'raw');
      const value =
        state.tab === 'code'
          ? state.selected.codeTrace || { note: '当前节点没有对应的代码函数映射。' }
          : state.tab === 'input'
            ? state.selected.input
            : state.tab === 'output'
              ? state.selected.output
              : state.selected.raw;
      $('jsonBox').innerHTML = renderJsonTree(value);
    }

    function renderExplanation() {
      const explanation = state.selected?.explanation;
      if (!explanation) {
        $('explainBox').innerHTML = '<strong>机制解读（非原始日志）</strong><p>当前节点没有额外注释；上方 JSON 是日志里能看到的原始或最近似原始记录。</p>';
        return;
      }
      const usedByNext = Array.isArray(explanation.usedByNext) ? explanation.usedByNext.join('；') : explanation.usedByNext;
      const rows = [
        ['事件状态', explanation.eventStatus],
        ['最终状态', explanation.finalStatusForSameStepId],
        ['耗时', explanation.duration],
        ['耗时口径', explanation.durationSemantics],
        ['日志形态', explanation.note],
        ['由谁产生', explanation.producedBy],
        ['后续怎么用', usedByNext],
        ['暂存/落库位置', explanation.persistence]
      ].filter(([, value]) => value !== undefined && value !== null && value !== '');
      $('explainBox').innerHTML = '<strong>机制解读（非原始日志）</strong><dl>' + rows.map(([key, value]) => `<div><dt>${escapeHtml(key)}</dt><dd>${escapeHtml(value)}</dd></div>`).join('') + '</dl>';
    }

    function renderMeta() {
      const user = data.user || {};
      const thread = data.thread || {};
      const call = data.selectedToolCall || {};
      $('subtitle').textContent = `账户 ${user.email || '未知'}，复现 ${shortDate(call.createdAt)} 的最近一次晨报更新 trace。`;
      $('meta').innerHTML = [
        ['账户', user.email || '未知'],
        ['用户 ID', user.id || '未知'],
        ['线程', thread.id || '未知'],
        ['工具调用', call.toolName || '未知'],
        ['运行状态', call.status || '未知'],
        ['执行时间', shortDate(call.createdAt)],
        ['导出时间', shortDate(data.exportedAt)]
      ].map(([k, v]) => `<div><span>${escapeHtml(k)}</span><span>${escapeHtml(v)}</span></div>`).join('');
      const stats = [
        ['步骤', data.stats.plannerTraceCount],
        ['子 Agent', data.stats.subagentCount],
        ['大模型调用', data.stats.modelCallCount],
        ['工具调用', data.stats.toolCallCount],
        ['信息源条目', data.stats.sourceCount]
      ];
      $('stats').innerHTML = stats.map(([label, value]) => `<div class="stat"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>`).join('');
      const navItems = [
        ['timeline', '调用链路'],
        ['agents', '子 Agent'],
        ['tools', '工具调用'],
        ['briefing', '最终晨报'],
        ['raw', '完整审计摘要']
      ];
      $('nav').innerHTML = navItems.map(([id, label]) => `<button data-view="${id}" class="${state.view === id ? 'active' : ''}">${label}</button>`).join('');
      $('nav').querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          state.view = button.dataset.view;
          if (state.view === 'raw') {
            setDetail(
              '完整审计摘要',
              data.limitation || '',
              { selectedToolCallArgs: data.selectedToolCall.toolArgs },
              { stats: data.stats },
              data.rawAudit,
              { key: 'code', label: '原始导出' },
              {
                producedBy: 'scripts/export-executive-run-audit.ts 从本地数据库导出的原始审计对象',
                usedByNext: ['本静态 HTML 页面用于复现展示'],
                persistence: '页面内嵌 JSON；不会回写数据库，也不会调用接口。'
              }
            );
          }
          renderMeta();
        });
      });
    }

    function renderTimeline() {
      const active = Math.max(state.index, -1);
      $('timeline').innerHTML = data.plannerTrace.map((step, index) => {
        const visible = index <= active;
        const cls = visible ? statusClass(step.status) : '';
        const kind = callKind(step);
        const finalEvent = finalEventForStep(step, index);
        const finalCls = statusClass(finalEvent.status);
        const duration = stepDurationDisplayInfo(step, index);
        return `<article class="step ${cls}" data-index="${index}" style="${visible ? '' : 'opacity:.38'}">
          <h3><span>${index + 1}. ${escapeHtml(step.title || step.id)}</span><span class="badge ${cls}">事件 ${escapeHtml(visible ? step.status : 'PENDING')}</span></h3>
          <p><span class="kind ${kind.key}">${escapeHtml(kind.label)}</span> ${modelCallsForStep(step).length ? `<span class="kind model">${modelCallsForStep(step).length} 次模型调用</span>` : ''}</p>
          <p><span class="badge ${finalCls}">最终 ${escapeHtml(finalEvent.status || step.status)}</span> ${duration.label ? `<span class="badge">耗时 ${escapeHtml(duration.label)}</span>` : ''} ${finalEvent !== step ? '后续同一步骤已更新状态' : '该步骤最终事件'}</p>
          <p>${escapeHtml(visible ? (step.detail || step.error || step.description || '') : '等待执行')}</p>
        </article>`;
      }).join('');
      $('timeline').querySelectorAll('.step').forEach((el) => {
        el.addEventListener('click', () => {
          const index = Number(el.dataset.index);
          state.canvasFocus = { kind: 'step', index };
          const step = data.plannerTrace[index];
          const io = deriveStepIO(step, index);
          setDetail(`步骤 ${index + 1}: ${step.title || step.id}`, step.detail || step.error || step.description, io.input, io.output, { step, relatedModelCalls: io.relatedModelCalls }, io.callType, io.explanation, io.codeTrace);
          renderCallCanvas();
        });
      });
    }

    function renderAgents() {
      $('agents').innerHTML = data.subagents.map((agent) => {
        const cls = agent.briefingItems.length > 0 ? 'success' : 'skipped';
        return `<article class="agent" data-agent="${escapeHtml(agent.agentType)}">
          <strong>${escapeHtml(agent.agentType)}</strong>
          <span>${agent.briefingItems.length} 条 briefingItems · debug: ${Object.keys(agent.debug || {}).length} 个字段</span>
        </article>`;
      }).join('') || '<div class="empty">没有实际执行的子 Agent。</div>';
      $('agents').querySelectorAll('.agent').forEach((el) => {
        el.addEventListener('click', () => {
          const agent = data.subagents.find((item) => item.agentType === el.dataset.agent);
          setDetail(`子 Agent: ${agent.agentType}`, agent.answer || '', {
            rawSubagentInvocationInputPersisted: false,
            nearestObservedInputsFromAudit: {
              userQuery: data.request?.userQuery,
              mode: 'briefing'
            }
          }, {
            answer: agent.answer,
            itemCount: agent.briefingItems.length,
            briefingItems: agent.briefingItems,
            debug: agent.debug
          }, agent, { key: 'mixed', label: '子 Agent 结果' }, {
            producedBy: `${agent.agentType} 子 agent 的执行结果，来自 selectedToolCall.toolResult.subagents`,
            usedByNext: ['merge_results 合并晨报候选信息', '最终 executive_briefings.sections/sources'],
            persistence: '已作为 selectedToolCall.toolResult 的一部分落库；async run 中也会进入 executive_assistant_runs.result。'
          });
        });
      });
    }

    function renderTools() {
      $('tools').innerHTML = data.toolCalls.map((tool, index) => {
        const cls = statusClass(tool.status);
        return `<article class="tool" data-index="${index}">
          <strong>${tool.index}. ${escapeHtml(tool.toolName)}</strong>
          <span class="badge ${cls}">${escapeHtml(tool.status)}</span>
        </article>`;
      }).join('') || '<div class="empty">没有工具调用。</div>';
      $('tools').querySelectorAll('.tool').forEach((el) => {
        el.addEventListener('click', () => {
          const tool = data.toolCalls[Number(el.dataset.index)];
          setDetail(`工具调用: ${tool.toolName}`, `状态：${tool.status}`, tool.args, tool.result, tool, { key: 'code', label: '工具/代码调用' }, {
            producedBy: 'agent_tool_calls 或 selectedToolCall.toolResult.toolCalls 中记录的工具调用审计',
            usedByNext: ['对应 agent 的 debug/briefingItems', '最终晨报候选来源'],
            persistence: '工具调用参数和结果已随审计日志保存；是否另有业务表取决于具体 tool。'
          });
        });
      });
    }

    function renderModels() {
      $('models').innerHTML = data.modelTraces.map((trace, index) => {
        const cls = statusClass(trace.status);
        const label = modelPurposeLabels[trace.purpose] || trace.purpose;
        return `<article class="tool" data-index="${index}">
          <strong>${trace.index}. ${escapeHtml(label)}</strong>
          <span class="badge ${cls}">${escapeHtml(trace.status)}</span>
          <span>${escapeHtml(trace.type)} · ${escapeHtml(trace.model)} · ${escapeHtml(shortDate(trace.timestamp))}</span>
        </article>`;
      }).join('') || '<div class="empty">没有找到 OpenRouter raw trace。</div>';
      $('models').querySelectorAll('.tool').forEach((el) => {
        el.addEventListener('click', () => {
          const trace = data.modelTraces[Number(el.dataset.index)];
          state.canvasFocus = { kind: 'model', traceIndex: Number(el.dataset.index) };
          const label = modelPurposeLabels[trace.purpose] || trace.purpose;
          setDetail(`大模型调用: ${label}`, `模型：${trace.model}；类型：${trace.type}；耗时：${trace.durationMs || '未知'}ms`, {
            messages: trace.messages,
            tools: trace.tools,
            maxTokens: trace.maxTokens
          }, {
            output: trace.output,
            rawMessage: trace.rawMessage,
            rawCompletion: trace.rawCompletion,
            error: trace.error
          }, trace, { key: 'model', label: '大模型' }, {
            producedBy: '.debug/openrouter-traces JSONL 捕获的 OpenRouter 调用',
            usedByNext: ['调用方代码解析 output/rawMessage 后生成 planner、briefingItems、sections 或最终回复'],
            persistence: '这类完整 prompt/completion 当前来自本地 debug trace；数据库审计通常只保存被解析后的业务结果。'
          });
          renderCallCanvas();
        });
      });
    }

    function renderSections() {
      const sections = data.document.displaySections || [];
      $('sections').innerHTML = sections.map((section, sectionIndex) => {
        const items = section.items || [];
        return `<section class="section">
          <header><h3>${escapeHtml(section.title)}</h3><span class="badge">${items.length} 条</span></header>
          <div class="items">
            ${items.map((item, itemIndex) => `<article class="item" data-section="${sectionIndex}" data-item="${itemIndex}">
              <h4>${escapeHtml(item.title || '未命名')}</h4>
              <p>${escapeHtml((item.summary || '').slice(0, 180))}</p>
              <p>${escapeHtml(item.source || '')}${item.url ? ' · ' + escapeHtml(item.url) : ''}</p>
            </article>`).join('') || '<div class="empty">没有条目。</div>'}
          </div>
        </section>`;
      }).join('');
      $('sections').querySelectorAll('.item').forEach((el) => {
        el.addEventListener('click', () => {
          const section = sections[Number(el.dataset.section)];
        const item = (section.items || [])[Number(el.dataset.item)];
          setDetail(`晨报条目: ${item.title || section.title}`, item.summary || '', {
            section: section.title,
            sourceCount: data.document.sources.length
          }, item, { section, item }, { key: 'code', label: '展示数据' }, {
            producedBy: '结构化晨报 document.sections 中的条目',
            usedByNext: ['前端晨报页面展示', '后续用户阅读、追问或决策分身推荐'],
            persistence: '最终落在 executive_briefings.sections；来源引用落在 executive_briefings.sources。'
          });
        });
      });
    }

    function renderPlayback() {
      const total = data.plannerTrace.length;
      const done = Math.max(0, Math.min(total, state.index + 1));
      const pct = total ? Math.round((done / total) * 100) : 0;
      $('progressFill').style.width = pct + '%';
      if (state.index < 0) {
        $('statusLine').textContent = '等待点击“更新晨报”。';
        $('runStatus').textContent = 'READY';
        $('runStatus').className = 'badge';
      } else if (state.index >= total - 1 && !state.playing) {
        $('statusLine').textContent = '复现完成：已展示这次历史晨报更新的完整持久化调用链路。';
        $('runStatus').textContent = 'SUCCESS';
        $('runStatus').className = 'badge success';
      } else {
        const current = data.plannerTrace[state.index];
        $('statusLine').textContent = current?.detail || current?.title || '正在播放历史 trace。';
        const cls = statusClass(current?.status || 'RUNNING');
        $('runStatus').textContent = current?.status || 'RUNNING';
        $('runStatus').className = 'badge ' + cls;
      }
      $('prevBtn').disabled = state.index < 0;
      $('nextBtn').disabled = state.index >= total - 1;
      renderTimeline();
      renderCallCanvas();
    }

    function stopPlaybackForManualStep() {
      window.clearTimeout(state.timer);
      state.playing = false;
      state.paused = false;
      $('startBtn').disabled = false;
      $('pauseBtn').disabled = true;
      $('pauseBtn').textContent = '暂停';
    }

    function selectPlannerIndex(index) {
      stopPlaybackForManualStep();
      const total = data.plannerTrace.length;
      state.index = Math.max(-1, Math.min(total - 1, index));
      if (state.index < 0) {
        state.canvasFocus = null;
        setDetail('请求输入', '点击“更新晨报”会提交这个用户请求；本页面只使用历史日志复现。', data.request, { note: '未调用接口，未创建新任务。' }, data.rawAudit, { key: 'code', label: '前端请求' }, {
          producedBy: '历史 selectedToolCall.toolArgs',
          usedByNext: ['播放复现入口'],
          persistence: '页面内嵌历史日志；不会调用接口。'
        });
      } else {
        state.canvasFocus = { kind: 'step', index: state.index };
        const step = data.plannerTrace[state.index];
        const io = deriveStepIO(step, state.index);
        setDetail(`步骤 ${state.index + 1}: ${step.title || step.id}`, step.detail || step.error || step.description, io.input, io.output, { step, relatedModelCalls: io.relatedModelCalls }, io.callType, io.explanation, io.codeTrace);
      }
      renderPlayback();
    }

    function previousStep() {
      selectPlannerIndex(state.index - 1);
    }

    function nextStep() {
      selectPlannerIndex(state.index + 1);
    }

    function tick() {
      if (!state.playing || state.paused) return;
      if (state.index < data.plannerTrace.length - 1) {
        state.index += 1;
        state.canvasFocus = { kind: 'step', index: state.index };
        const step = data.plannerTrace[state.index];
        const io = deriveStepIO(step, state.index);
        setDetail(`步骤 ${state.index + 1}: ${step.title || step.id}`, step.detail || step.error || step.description, io.input, io.output, { step, relatedModelCalls: io.relatedModelCalls }, io.callType, io.explanation, io.codeTrace);
        renderPlayback();
        state.timer = window.setTimeout(tick, Number($('speedInput').value));
      } else {
        state.playing = false;
        state.paused = false;
        $('startBtn').disabled = false;
        $('pauseBtn').disabled = true;
        renderPlayback();
      }
    }

    function start() {
      window.clearTimeout(state.timer);
      state.playing = true;
      state.paused = false;
      state.index = -1;
      state.canvasFocus = null;
      $('startBtn').disabled = true;
      $('pauseBtn').disabled = false;
      $('pauseBtn').textContent = '暂停';
      setDetail('请求输入', '点击“更新晨报”后前端提交给后台的固定提示词。', data.request, { runId: '(历史日志复现，无实际新建 run)' }, data.selectedToolCall, { key: 'code', label: '前端请求' }, {
        producedBy: '前端“更新晨报”按钮提交的用户请求；本页面使用历史日志复现',
        usedByNext: ['POST /api/investor/executive-assistant?async=1', '后台创建 run 并执行 planner'],
        persistence: '真实运行中会进入 AgentMessage/AgentToolCall/ExecutiveAssistantRun；本页面不会创建新记录。'
      });
      renderPlayback();
      state.timer = window.setTimeout(tick, 260);
    }

    function pause() {
      if (!state.playing) return;
      state.paused = !state.paused;
      $('pauseBtn').textContent = state.paused ? '继续' : '暂停';
      if (!state.paused) {
        state.timer = window.setTimeout(tick, Number($('speedInput').value));
      }
    }

    function reset() {
      window.clearTimeout(state.timer);
      state.playing = false;
      state.paused = false;
      state.index = -1;
      state.canvasFocus = null;
      $('startBtn').disabled = false;
      $('pauseBtn').disabled = true;
      $('pauseBtn').textContent = '暂停';
      setDetail('请求输入', '点击“更新晨报”会提交这个用户请求；本页面只使用历史日志复现。', data.request, { note: '未调用接口，未创建新任务。' }, data.rawAudit, { key: 'code', label: '前端请求' }, {
        producedBy: '历史 selectedToolCall.toolArgs',
        usedByNext: ['播放复现入口'],
        persistence: '页面内嵌历史日志；不会调用接口。'
      });
      renderPlayback();
    }

    $('startBtn').addEventListener('click', start);
    $('prevBtn').addEventListener('click', previousStep);
    $('nextBtn').addEventListener('click', nextStep);
    $('pauseBtn').addEventListener('click', pause);
    $('resetBtn').addEventListener('click', reset);
    $('callCanvas').addEventListener('click', handleCanvasClick);
    window.addEventListener('resize', renderCallCanvas);
    $('tabCode').addEventListener('click', () => { state.tab = 'code'; renderJson(); });
    $('tabInput').addEventListener('click', () => { state.tab = 'input'; renderJson(); });
    $('tabOutput').addEventListener('click', () => { state.tab = 'output'; renderJson(); });
    $('tabRaw').addEventListener('click', () => { state.tab = 'raw'; renderJson(); });

    renderMeta();
    renderAgents();
    renderModels();
    renderTools();
    renderSections();
    reset();
  </script>
</body>
</html>
