services:
  personal-agent-server:
    image: ${PERSONAL_AGENT_IMAGE:-altselfs/personal-agent-server:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "${PERSONAL_AGENT_HOST_PORT:-8787}:8787"
    volumes:
      - /data/altselfs-agent:/data/altselfs-agent
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
